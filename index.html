const C = {
  primary:"#1e3a5f", secondary:"#0ea5e9", accent:"#f59e0b",
  success:"#10b981", error:"#ef4444", bg:"#f0f4f8",
  card:"#ffffff", text:"#1e293b", muted:"#64748b",
};

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

const btnStyle = (bg,col,extra={}) => ({
  background:bg, color:col, border:"none", borderRadius:12,
  padding:"12px 18px", fontWeight:700, fontSize:14, cursor:"pointer",
  display:"flex", alignItems:"center", justifyContent:"center", gap:6, ...extra
});

function ProgressBar({val,max,color=C.secondary}) {
  const pct=max>0?Math.min(100,(val/max)*100):0;
  return <div style={{background:"#e2e8f0",borderRadius:8,height:8,overflow:"hidden"}}>
    <div style={{width:`${pct}%`,background:color,height:"100%",borderRadius:8,transition:"width .4s"}}/>
  </div>;
}

function Header({title,onBack,right}) {
  return <div style={{background:`linear-gradient(135deg,${C.primary},#2563eb)`,color:"#fff",padding:"14px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:50}}>
    {onBack && <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",padding:4,fontSize:22,lineHeight:1}}>‹</button>}
    <span style={{flex:1,fontWeight:800,fontSize:16}}>{title}</span>
    {right && <span style={{fontSize:13,opacity:.8}}>{right}</span>}
  </div>;
}

function Card({children,style={}}) {
  return <div style={{background:C.card,borderRadius:16,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,.08)",margin:"10px 14px",...style}}>{children}</div>;
}

function Tag({label,color}) {
  return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:color+"22",color}}>{label}</span>;
}

function QuizResult({score,total,onRetry,onHome}) {
  const pct=total>0?Math.round(score/total*100):0;
  const [emoji,msg]=pct>=90?["🏆","완벽!"]:pct>=70?["⭐","훌륭해요!"]:pct>=50?["👍","좋아요!"]:["💪","다시 도전!"];
  const color=pct>=70?C.success:pct>=50?C.accent:C.error;
  return <Card style={{textAlign:"center",padding:32}}>
    <div style={{fontSize:52}}>{emoji}</div>
    <div style={{fontSize:26,fontWeight:900,color,margin:"8px 0"}}>{pct}점</div>
    <div style={{color:C.muted,marginBottom:6}}>{score}/{total} 정답</div>
    <div style={{fontSize:16,fontWeight:700,color,marginBottom:24}}>{msg}</div>
    <div style={{display:"flex",gap:10}}>
      <button onClick={onRetry} style={{...btnStyle(C.secondary,"#fff"),flex:1}}>🔄 다시 풀기</button>
      <button onClick={onHome} style={{...btnStyle(C.primary,"#fff"),flex:1}}>‹ 메뉴로</button>
    </div>
  </Card>;
}

function MCQ({question,opts,selected,onSelect,answered,correct,explanation}) {
  return <div>
    <p style={{fontWeight:600,fontSize:14,lineHeight:1.7,marginBottom:14,whiteSpace:"pre-line"}}>{question}</p>
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      {opts.map((opt,i)=>{
        let bg="#f8fafc",border="2px solid #e2e8f0",color=C.text;
        if(answered){
          if(i===correct){bg="#d1fae5";border=`2px solid ${C.success}`;color="#065f46";}
          else if(i===selected&&i!==correct){bg="#fee2e2";border=`2px solid ${C.error}`;color="#991b1b";}
        } else if(i===selected){bg="#dbeafe";border=`2px solid ${C.secondary}`;}
        return <button key={i} onClick={()=>!answered&&onSelect(i)}
          style={{background:bg,border,borderRadius:12,padding:"11px 14px",textAlign:"left",cursor:answered?"default":"pointer",color,fontWeight:500,fontSize:13,display:"flex",alignItems:"center",gap:10}}>
          <span style={{minWidth:22,height:22,borderRadius:11,background:answered&&i===correct?C.success:answered&&i===selected&&i!==correct?C.error:"#cbd5e1",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>
            {answered&&i===correct?"✓":answered&&i===selected&&i!==correct?"✗":["①","②","③","④"][i]}
          </span>
          {opt}
        </button>;
      })}
    </div>
    {answered&&explanation&&<div style={{marginTop:10,padding:"12px 14px",background:"#fffbeb",borderRadius:12,borderLeft:`4px solid ${C.accent}`,fontSize:13}}>
      <div style={{fontWeight:700,color:C.accent,marginBottom:4}}>💡 해설</div>
      <div style={{lineHeight:1.6}}>{explanation}</div>
    </div>}
  </div>;
}

function VocabFlash({goBack}) {
  const [order]=useState(()=>shuffle([...Array(VOCAB.length).keys()]));

  const [showKo,setShowKo]=useState(false);

  return <div>

        {!flipped?<>
          <div style={{fontSize:28,fontWeight:900,color:C.primary,marginBottom:8}}>{v.word}</div>

          <div style={{fontSize:12,color:C.muted,marginTop:12}}>탭하여 뜻 확인</div>
        </>:<>
          <div style={{fontSize:14,fontWeight:700,color:"#93c5fd",marginBottom:10}}>{v.word}</div>
          <div style={{fontSize:15,color:"#fff",lineHeight:1.7,marginBottom:10}}>{v.def}</div>
          <div style={{fontSize:13,color:"#bfdbfe",fontStyle:"italic"}}>"{v.ex}"</div>
        </>}
      </div>
      <div style={{display:"flex",gap:10,marginTop:12}}>
        <button onClick={()=>{setIdx(Math.max(0,idx-1));setFlipped(false);}} disabled={idx===0}
          style={{...btnStyle(idx===0?"#e2e8f0":C.card,idx===0?C.muted:C.primary),flex:1,border:`2px solid ${idx===0?"#e2e8f0":"#cbd5e1"}`}}>‹ 이전</button>
        <button onClick={()=>setShowKo(!showKo)} style={{...btnStyle("#f0f4f8",C.muted),padding:"12px 14px"}}>{showKo?"🙈":"👁"}</button>
        <button onClick={()=>{setIdx(Math.min(VOCAB.length-1,idx+1));setFlipped(false);}} disabled={idx===VOCAB.length-1}
          style={{...btnStyle(idx===VOCAB.length-1?"#e2e8f0":C.secondary,idx===VOCAB.length-1?C.muted:"#fff"),flex:1}}>다음 ›</button>
      </div>

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Tag label={v.ko} color={C.primary}/>
          {v.syn!=="-"&&<Tag label={`= ${v.syn}`} color={C.accent}/>}
        </div>
      </Card>
    </div>
  </div>;
}

function VocabQuiz({goBack,updateProgress}) {
  const makeQ=()=>{const s=shuffle(VOCAB);const t=s[0];const opts=shuffle([t,...s.slice(1,4)]);return{t,opts,correct:opts.findIndex(o=>o.id===t.id)};};
  const [q,setQ]=useState(makeQ);
  const [sel,setSel]=useState(null);
  const [ans,setAns]=useState(false);
  const [score,setScore]=useState(0);
  const [cnt,setCnt]=useState(0);
  const [done,setDone]=useState(false);
  const T=10;
  const pick=(i)=>{if(ans)return;setSel(i);setAns(true);if(i===q.correct)setScore(s=>s+1);setCnt(c=>c+1);};
  const next=()=>{if(cnt>=T){setDone(true);updateProgress("vocab",score,T);return;}setQ(makeQ());setSel(null);setAns(false);};
  const retry=()=>{setScore(0);setCnt(0);setDone(false);setQ(makeQ());setSel(null);setAns(false);};
  if(done)return <div><Header title="🎯 어휘 퀴즈" onBack={goBack}/><QuizResult score={score} total={T} onRetry={retry} onHome={goBack}/></div>;
  return <div>
    <Header title="🎯 어휘 퀴즈" onBack={goBack} right={`${cnt+1}/${T}`}/>
    <div style={{padding:14}}>
      <ProgressBar val={cnt} max={T}/>
      <Card style={{marginTop:10}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:8}}>단어의 한국어 뜻으로 알맞은 것은?</div>
        <div style={{fontSize:24,fontWeight:900,color:C.primary,marginBottom:4}}>{q.t.word}</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14,fontStyle:"italic"}}>"{q.t.ex}"</div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {q.opts.map((v,i)=>{
            let bg="#f8fafc",border="2px solid #e2e8f0",col=C.text;
            if(ans){if(i===q.correct){bg="#d1fae5";border=`2px solid ${C.success}`;col="#065f46";}else if(i===sel&&i!==q.correct){bg="#fee2e2";border=`2px solid ${C.error}`;col="#991b1b";}}
            else if(i===sel){bg="#dbeafe";border=`2px solid ${C.secondary}`;}
            return <button key={i} onClick={()=>pick(i)} style={{background:bg,border,borderRadius:12,padding:"11px 14px",textAlign:"left",cursor:ans?"default":"pointer",color:col,fontWeight:600,fontSize:13}}>{v.ko}</button>;
          })}
        </div>
        {ans&&<div style={{marginTop:10,padding:"10px 14px",background:"#fffbeb",borderRadius:12,borderLeft:`4px solid ${C.accent}`,fontSize:12}}><b>{q.t.word}</b>: {q.t.def}</div>}
      </Card>
      {ans&&<button onClick={next} style={{...btnStyle(C.secondary,"#fff"),width:"100%",margin:"4px 0"}}>{cnt+1>=T?"결과 보기":"다음 ›"}</button>}
    </div>
  </div>;
}

function DialogueTF({dialogueId,goBack,updateProgress}) {
  const d=DIALOGUES.find(d=>d.id===dialogueId)||DIALOGUES[0];
  const [idx,setIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [done,setDone]=useState(false);
  const answer=(choice)=>{if(answers[idx]!==undefined)return;setAnswers(p=>({...p,[idx]:choice}));};
  const next=()=>{if(idx+1>=d.tf.length){const s=Object.values(answers).filter((a,i)=>a===d.tf[i].a).length;updateProgress("dialogue",s,d.tf.length);setDone(true);}else setIdx(i=>i+1);};
  const retry=()=>{setIdx(0);setAnswers({});setDone(false);};
  const score=Object.entries(answers).filter(([i,a])=>a===d.tf[Number(i)].a).length;
  if(done)return <div><Header title="✅ T/F 문제" onBack={goBack}/><QuizResult score={score} total={d.tf.length} onRetry={retry} onHome={goBack}/></div>;
  const q=d.tf[idx];
  const answered=answers[idx]!==undefined;
  const isCorrect=answers[idx]===q.a;
  return <div>
    <Header title={`${d.icon} T/F`} onBack={goBack} right={`${idx+1}/${d.tf.length}`}/>
    <div style={{padding:14}}>
      <ProgressBar val={idx} max={d.tf.length}/>
      <Card style={{marginTop:12}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:10}}>대화 내용과 일치하면 T, 틀리면 F</div>
        <div style={{background:"#f8fafc",borderRadius:12,padding:14,fontSize:14,fontWeight:600,lineHeight:1.7,marginBottom:16}}>{q.q}</div>
        <div style={{display:"flex",gap:12}}>
          {[true,false].map(val=>{
            let style_={background:"#f8fafc",border:"2px solid #e2e8f0",color:C.muted};
            if(!answered)style_={background:val?"#dcfce7":"#fee2e2",border:val?`2px solid ${C.success}`:`2px solid ${C.error}`,color:val?"#065f46":"#991b1b"};
            else if(answers[idx]===val)style_={background:val?"#dcfce7":"#fee2e2",border:val?`2px solid ${C.success}`:`2px solid ${C.error}`,color:val?"#065f46":"#991b1b"};
            return <button key={String(val)} onClick={()=>answer(val)} disabled={answered}
              style={{...style_,flex:1,borderRadius:12,padding:16,fontSize:20,fontWeight:900,cursor:answered?"default":"pointer"}}>{val?"T":"F"}</button>;
          })}
        </div>
        {answered&&<div style={{marginTop:10,padding:"10px 14px",background:isCorrect?"#d1fae5":"#fee2e2",borderRadius:12,borderLeft:`4px solid ${isCorrect?C.success:C.error}`,fontSize:13}}>
          {isCorrect?"✅ 정답입니다!":"❌ 오답. 정답: "+(q.a?"T":"F")}
        </div>}
      </Card>
      {answered&&<button onClick={next} style={{...btnStyle(C.secondary,"#fff"),width:"100%",marginTop:4}}>{idx+1>=d.tf.length?"결과 보기":"다음 ›"}</button>}
    </div>
  </div>;
}

function DialogueOrder({dialogueId,goBack,updateProgress}) {
  const d=DIALOGUES.find(d=>d.id===dialogueId)||DIALOGUES[0];
  const lines5=d.lines.slice(0,Math.min(5,d.lines.length));
  const [items,setItems]=useState(()=>shuffle(lines5.map((l,i)=>({...l,origIdx:i}))));
  const [checked,setChecked]=useState(false);
  const spC={G:"#6366f1",B:"#0ea5e9",W:"#ec4899"};
  const spN={G:"소녀",B:"소년",W:"여자"};
  const move=(i,dir)=>{const arr=[...items];const j=i+dir;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];setItems(arr);};
  const check=()=>{const ok=items.every((item,i)=>item.origIdx===i);setChecked(true);updateProgress("dialogue",ok?1:0,1);};
  const retry=()=>{setItems(shuffle(lines5.map((l,i)=>({...l,origIdx:i}))));setChecked(false);};
  const allOk=items.every((item,i)=>item.origIdx===i);
  return <div>
    <Header title={`${d.icon} 순서 배열`} onBack={goBack}/>
    <div style={{padding:14}}>
      <div style={{background:"#eff6ff",borderRadius:12,padding:"10px 14px",marginBottom:8,fontSize:12,color:C.secondary,fontWeight:600}}>📌 올바른 순서로 배열하세요. ↑↓ 버튼으로 이동</div>
      {items.map((l,i)=>{
        const ok=checked&&l.origIdx===i;
        const no=checked&&l.origIdx!==i;
        return <div key={l.en} style={{background:C.card,borderRadius:12,padding:"10px 12px",marginBottom:8,borderLeft:`4px solid ${ok?C.success:no?C.error:spC[l.sp]||"#94a3b8"}`,boxShadow:"0 1px 6px rgba(0,0,0,.06)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:18,fontWeight:900,color:C.muted,minWidth:22}}>{i+1}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:800,color:spC[l.sp]||"#94a3b8"}}>{spN[l.sp]||l.sp}</div>
            <div style={{fontSize:12,lineHeight:1.5,marginTop:2}}>{l.en}</div>
          </div>
          {!checked&&<div style={{display:"flex",flexDirection:"column",gap:4}}>
            <button onClick={()=>move(i,-1)} disabled={i===0} style={{border:"none",background:"#f0f4f8",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12}}>▲</button>
            <button onClick={()=>move(i,1)} disabled={i===items.length-1} style={{border:"none",background:"#f0f4f8",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12}}>▼</button>
          </div>}
          {checked&&<span style={{fontSize:18}}>{ok?"✅":"❌"}</span>}
        </div>;
      })}
      {!checked?<button onClick={check} style={{...btnStyle(C.primary,"#fff"),width:"100%",marginTop:4}}>정답 확인</button>:
      <div>
        <Card style={{textAlign:"center",background:allOk?"#d1fae5":"#fee2e2",margin:"10px 0"}}>
          <div style={{fontSize:22}}>{allOk?"🎉":"🔄"}</div>
          <div style={{fontWeight:700,color:allOk?C.success:C.error,marginTop:4}}>{allOk?"완벽한 순서예요!":"순서가 맞지 않아요."}</div>
        </Card>
        <div style={{display:"flex",gap:10}}>
          <button onClick={retry} style={{...btnStyle(C.accent,"#fff"),flex:1}}>🔄 다시</button>
          <button onClick={goBack} style={{...btnStyle(C.primary,"#fff"),flex:1}}>‹ 메뉴</button>
        </div>
      </div>}
    </div>
  </div>;
}

  const d=DIALOGUES.find(d=>d.id===dialogueId)||DIALOGUES[0];

  const [answered,setAnswered]=useState(false);
  const isCorrect=input.trim().toLowerCase()===b.answer.toLowerCase();
  const spC={G:"#6366f1",B:"#0ea5e9",W:"#ec4899"};
  const spN={G:"소녀",B:"소년",W:"여자"};
  return <div>
    <Header title={`${d.icon} 빈칸 채우기`} onBack={goBack}/>
    <div style={{padding:14}}>
      <div style={{background:"#eff6ff",borderRadius:12,padding:"10px 14px",marginBottom:4,fontSize:12,color:C.secondary,fontWeight:600}}>힌트: {b.hint}</div>
      <Card>
        <div style={{fontSize:11,color:C.muted,marginBottom:10}}>빈칸에 알맞은 말을 쓰시오.</div>
        <div style={{background:"#f8fafc",borderRadius:12,padding:14,fontSize:14,lineHeight:1.8,marginBottom:14}}>
          <span style={{fontWeight:800,color:spC[d.lines[b.line].sp]}}>{spN[d.lines[b.line].sp]}: </span>
          {b.sentence.replace(b.answer,"_____")}
        </div>
        <input value={input} onChange={e=>setInput(e.target.value)} disabled={answered}
          placeholder="정답을 입력하세요..."
          style={{width:"100%",padding:"11px 14px",borderRadius:12,border:`2px solid ${answered?isCorrect?C.success:C.error:"#e2e8f0"}`,fontSize:14,outline:"none",background:answered?isCorrect?"#d1fae5":"#fee2e2":"#fff",boxSizing:"border-box",marginBottom:10}}/>
        {!answered?<button onClick={()=>{setAnswered(true);updateProgress("dialogue",isCorrect?1:0,1);}} disabled={!input.trim()}
          style={{...btnStyle(input.trim()?C.primary:"#e2e8f0",input.trim()?"#fff":C.muted),width:"100%"}}>제출</button>:
        <div style={{padding:"10px 14px",background:isCorrect?"#d1fae5":"#fee2e2",borderRadius:12,borderLeft:`4px solid ${isCorrect?C.success:C.error}`,fontSize:13}}>
          {isCorrect?"✅ 정답입니다!":"❌ 오답. 정답: "+b.answer}
        </div>}
      </Card>
      {answered&&<Card style={{background:"#fffbeb"}}>
        <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6}}>📖 전체 문장</div>
        <div style={{fontSize:13,lineHeight:1.7}}>{b.sentence}</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>{d.lines[b.line].ko}</div>
      </Card>}
    </div>
  </div>;
}

function GrammarQuiz({goBack,updateProgress}) {
  const [diff,setDiff]=useState(null);
  const [pool]=useState(()=>shuffle(GRAMMAR_QS));
  const [qIdx,setQIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [ans,setAns]=useState(false);
  const [score,setScore]=useState(0);
  const [cnt,setCnt]=useState(0);
  const [done,setDone]=useState(false);
  const T=8;
  const filtered=diff?pool.filter(q=>q.diff===diff):pool;
  const q=filtered[qIdx%filtered.length];
  const pick=(i)=>{if(ans)return;setSel(i);setAns(true);if(i===q.ans)setScore(s=>s+1);setCnt(c=>c+1);};
  const next=()=>{if(cnt>=T){setDone(true);updateProgress("grammar",score,T);return;}setQIdx(i=>i+1);setSel(null);setAns(false);};
  const retry=()=>{setScore(0);setCnt(0);setDone(false);setQIdx(0);setSel(null);setAns(false);setDiff(null);};
  if(!diff)return <div>
    <Header title="⚡ 문법 퀴즈" onBack={goBack}/>
    <div style={{padding:14}}>
      <Card style={{textAlign:"center",padding:28}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>난이도를 선택하세요</div>
        {["전체","기본","발전","심화"].map(d=>{
          const c=d==="기본"?C.success:d==="발전"?C.accent:d==="심화"?C.error:C.primary;
          return <button key={d} onClick={()=>setDiff(d==="전체"?null:d)} style={{...btnStyle(c,"#fff"),width:"100%",marginBottom:10,fontSize:15}}>{d}</button>;
        })}
      </Card>
    </div>
  </div>;
  if(done)return <div><Header title="⚡ 문법 퀴즈" onBack={goBack}/><QuizResult score={score} total={T} onRetry={retry} onHome={goBack}/></div>;
  return <div>
    <Header title="⚡ 문법 퀴즈" onBack={goBack} right={`${cnt+1}/${T}`}/>
    <div style={{padding:14}}>
      <ProgressBar val={cnt} max={T}/>
      <div style={{display:"flex",gap:6,margin:"8px 0"}}>
        <Tag label={q.diff} color={q.diff==="기본"?C.success:q.diff==="발전"?C.accent:C.error}/>
        <Tag label={q.topic} color={C.secondary}/>
      </div>
      <Card><MCQ question={q.q} opts={q.opts} selected={sel} onSelect={pick} answered={ans} correct={q.ans} explanation={q.exp}/></Card>
      {ans&&<button onClick={next} style={{...btnStyle(C.secondary,"#fff"),width:"100%",marginTop:4}}>{cnt+1>=T?"결과 보기":"다음 ›"}</button>}
    </div>
  </div>;
}

      <ProgressBar val={cnt} max={T}/>
      <div style={{margin:"8px 0"}}><Tag label={q.diff} color={q.diff==="기본"?C.success:q.diff==="발전"?C.accent:C.error}/></div>
      <Card><MCQ question={q.q} opts={q.opts} selected={sel} onSelect={pick} answered={ans} correct={q.ans} explanation={q.exp}/></Card>
      {ans&&<button onClick={next} style={{...btnStyle(C.secondary,"#fff"),width:"100%",marginTop:4}}>{cnt+1>=T?"결과 보기":"다음 ›"}</button>}
    </div>
  </div>;
}

function MasterQuiz({goBack,updateProgress}) {
  const [diff,setDiff]=useState(null);
  const T=12;
  const [pool,setPool]=useState(null);
  const [qIdx,setQIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [ans,setAns]=useState(false);
  const [score,setScore]=useState(0);
  const [cnt,setCnt]=useState(0);
  const [done,setDone]=useState(false);
  const start=(d)=>{
    const gqs=d&&d!=="전체"?GRAMMAR_QS.filter(q=>q.diff===d):GRAMMAR_QS;
    const cqs=d&&d!=="전체"?COMPREHENSION.filter(q=>q.diff===d):COMPREHENSION;
    setPool(shuffle([...shuffle(gqs).slice(0,6),...shuffle(cqs).slice(0,6)]).slice(0,T));
    setDiff(d);
  };
  const q=pool?pool[qIdx]:null;
  const pick=(i)=>{if(ans||!q)return;setSel(i);setAns(true);if(i===q.ans)setScore(s=>s+1);setCnt(c=>c+1);};
  const next=()=>{if(cnt>=T||qIdx>=pool.length-1){setDone(true);updateProgress("master",score,T);return;}setQIdx(i=>i+1);setSel(null);setAns(false);};
  const retry=()=>{setScore(0);setCnt(0);setDone(false);setQIdx(0);setSel(null);setAns(false);setDiff(null);setPool(null);};
  if(!diff)return <div>
    <Header title="🏆 종합 퀴즈" onBack={goBack}/>
    <div style={{padding:14}}>
      <Card style={{background:"#fffbeb",border:`1px solid ${C.accent}44`,marginBottom:12}}>
        <div style={{fontWeight:700,color:C.accent,marginBottom:6}}>📝 안내</div>
        <div style={{fontSize:12,lineHeight:1.8}}>문법 + 독해 문제 혼합 출제 · 총 {T}문제</div>
      </Card>
      {["전체","기본","발전","심화"].map(d=>{
        const c=d==="기본"?C.success:d==="발전"?C.accent:d==="심화"?C.error:C.primary;
        return <button key={d} onClick={()=>start(d)} style={{...btnStyle(c,"#fff"),width:"100%",marginBottom:10,fontSize:15}}>{d} 난이도</button>;
      })}
    </div>
  </div>;
  if(done)return <div><Header title="🏆 종합 퀴즈" onBack={goBack}/><QuizResult score={score} total={T} onRetry={retry} onHome={goBack}/></div>;
  if(!q)return null;
  const isG=GRAMMAR_QS.some(g=>g.id===q.id);
  return <div>
    <Header title={`🏆 종합 [${diff}]`} onBack={goBack} right={`${cnt+1}/${T}`}/>
    <div style={{padding:14}}>
      <ProgressBar val={cnt} max={T}/>
      <div style={{display:"flex",gap:6,margin:"8px 0"}}>
        <Tag label={q.diff} color={q.diff==="기본"?C.success:q.diff==="발전"?C.accent:C.error}/>
        <Tag label={isG?"문법":"독해"} color={isG?C.accent:C.secondary}/>
      </div>
      <Card><MCQ question={q.q} opts={q.opts} selected={sel} onSelect={pick} answered={ans} correct={q.ans} explanation={q.exp}/></Card>
      {ans&&<button onClick={next} style={{...btnStyle(C.secondary,"#fff"),width:"100%",marginTop:4}}>{cnt+1>=T||qIdx>=pool.length-1?"결과 보기":"다음 ›"}</button>}
    </div>
  </div>;
}

function MyRecord({goBack,progress}) {
  const cats=[
    {key:"vocab",label:"어휘",icon:"📚",color:"#6366f1"},
    {key:"grammar",label:"문법",icon:"⚡",color:C.accent},
    {key:"reading",label:"독해",icon:"📖",color:"#ec4899"},
    {key:"dialogue",label:"대화문",icon:"🗣️",color:C.success},
    {key:"master",label:"종합",icon:"🏆",color:C.error},
  ];
  const total=cats.reduce((a,c)=>(progress[c.key]||{total:0}).total+a,0);
  const totalScore=cats.reduce((a,c)=>(progress[c.key]||{score:0}).score+a,0);
  const overall=total>0?Math.round(totalScore/total*100):0;
  return <div>
    <Header title="📊 내 기록" onBack={goBack}/>
    <div style={{padding:14}}>
      <div style={{background:`linear-gradient(135deg,${C.primary},#2563eb)`,borderRadius:16,padding:24,textAlign:"center",color:"#fff",marginBottom:10}}>
        <div style={{fontSize:11,opacity:.8}}>전체 정답률</div>
        <div style={{fontSize:48,fontWeight:900}}>{overall}%</div>
        <div style={{fontSize:12,opacity:.8}}>총 {total}문항 · 정답 {totalScore}</div>
      </div>
      {cats.map(c=>{
        const p=progress[c.key]||{score:0,total:0,best:0};
        const pct=p.total>0?Math.round(p.score/p.total*100):0;
        return <Card key={c.key} style={{margin:"8px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{c.icon}</span><span style={{fontWeight:700,fontSize:14}}>{c.label}</span></div>
            <span style={{fontWeight:800,color:c.color,fontSize:16}}>{pct}%</span>
          </div>
          <ProgressBar val={p.score} max={p.total||1} color={c.color}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:11,color:C.muted}}>
            <span>{p.total}문항</span><span>최고 {p.best||0}%</span>
          </div>
        </Card>;
      })}
    </div>
  </div>;
}

function App() {
  const [screen,setScreen]=useState("home");
  const [stack,setStack]=useState([]);
  const [progress,setProgress]=useState({vocab:{score:0,total:0,best:0},grammar:{score:0,total:0,best:0},reading:{score:0,total:0,best:0},dialogue:{score:0,total:0,best:0},master:{score:0,total:0,best:0}});

  useEffect(()=>{
    const r=storage.get("lesson01_progress");
    if(r)try{setProgress(JSON.parse(r.value));}catch(e){}
  },[]);

  const updateProgress=useCallback((cat,score,total)=>{
    setProgress(prev=>{
      const p=prev[cat]||{score:0,total:0,best:0};
      const pct=total>0?Math.round(score/total*100):0;
      const next={...prev,[cat]:{score:p.score+score,total:p.total+total,best:Math.max(p.best||0,pct)}};
      storage.set("lesson01_progress",JSON.stringify(next));
      return next;
    });
  },[]);

  const goTo=(s)=>{setStack(p=>[...p,screen]);setScreen(s);};
  const goBack=()=>{if(stack.length>0){setScreen(stack[stack.length-1]);setStack(s=>s.slice(0,-1));}else setScreen("home");};

  const render=()=>{
    if(screen==="home")return <Home goTo={goTo} progress={progress}/>;
    if(screen==="vocab_menu")return <VocabMenu goTo={goTo} goBack={goBack}/>;
    if(screen==="vocab_flash")return <VocabFlash goBack={goBack}/>;
    if(screen==="vocab_quiz"||screen==="vocab_match")return <VocabQuiz goBack={goBack} updateProgress={updateProgress}/>;
    if(screen==="phrase_menu")return <PhraseMenu goBack={goBack}/>;
    if(screen==="dialogue_menu")return <DialogueMenu goTo={goTo} goBack={goBack}/>;
    if(screen.startsWith("dv_"))return <DialogueView dialogueId={parseInt(screen.split("_")[1])||1} goBack={goBack}/>;
    if(screen.startsWith("dtf_"))return <DialogueTF dialogueId={parseInt(screen.split("_")[1])||1} goBack={goBack} updateProgress={updateProgress}/>;
    if(screen.startsWith("dord_"))return <DialogueOrder dialogueId={parseInt(screen.split("_")[1])||1} goBack={goBack} updateProgress={updateProgress}/>;
    if(screen.startsWith("dblank_"))return <DialogueBlank dialogueId={parseInt(screen.split("_")[1])||1} goBack={goBack} updateProgress={updateProgress}/>;
    if(screen==="grammar_menu")return <GrammarMenu goTo={goTo} goBack={goBack}/>;
    if(screen.startsWith("gs_"))return <GrammarStudy noteId={screen.replace("gs_","")} goBack={goBack}/>;
    if(screen==="grammar_quiz")return <GrammarQuiz goBack={goBack} updateProgress={updateProgress}/>;
    if(screen==="reading_menu")return <div>
      <Header title="📖 본문 학습" onBack={goBack}/>
      <div style={{padding:14}}>
        {[{id:"reading_study",icon:"📄",label:"본문 읽기",desc:"본문 읽고 해석 확인"},{id:"reading_quiz",icon:"❓",label:"독해 퀴즈",desc:"내용 이해 문제 풀기"}].map(m=>(
          <button key={m.id} onClick={()=>goTo(m.id)} style={{...btnStyle(C.card,C.text),width:"100%",justifyContent:"flex-start",gap:14,marginBottom:10,padding:"16px 18px",boxShadow:"0 2px 8px rgba(0,0,0,.07)",borderRadius:14}}>
            <span style={{fontSize:28}}>{m.icon}</span>
            <div style={{textAlign:"left"}}><div style={{fontWeight:700,fontSize:14}}>{m.label}</div><div style={{color:C.muted,fontSize:12}}>{m.desc}</div></div>
            <span style={{marginLeft:"auto",color:C.muted}}>›</span>
          </button>
        ))}
      </div>
    </div>;
    if(screen==="reading_study")return <ReadingStudy goBack={goBack}/>;
    if(screen==="reading_quiz")return <ReadingQuiz goBack={goBack} updateProgress={updateProgress}/>;
    if(screen==="master_quiz")return <MasterQuiz goBack={goBack} updateProgress={updateProgress}/>;
    if(screen==="my_record")return <MyRecord goBack={goBack} progress={progress}/>;
    return <Home goTo={goTo} progress={progress}/>;
  };

  const navItems=[
    {s:"home",icon:"🏠",label:"홈"},
    {s:"vocab_menu",icon:"📚",label:"어휘"},
    {s:"dialogue_menu",icon:"🗣️",label:"대화"},
    {s:"grammar_menu",icon:"⚡",label:"문법"},
    {s:"master_quiz",icon:"🏆",label:"퀴즈"},
  ];

  return <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg,fontFamily:"'Apple SD Gothic Neo','Malgun Gothic',sans-serif"}}>
    <div style={{paddingBottom:80}}>{render()}</div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:100}}>
      {navItems.map(n=>(
        <button key={n.s} onClick={()=>{setStack([]);setScreen(n.s);}}
          style={{flex:1,padding:"9px 4px 13px",background:screen===n.s?"#eff6ff":"none",border:"none",cursor:"pointer",borderTop:screen===n.s?`2px solid ${C.secondary}`:"2px solid transparent"}}>
          <div style={{fontSize:17}}>{n.icon}</div>
          <div style={{fontSize:10,fontWeight:700,color:screen===n.s?C.secondary:C.muted,marginTop:1}}>{n.label}</div>
        </button>
      ))}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
